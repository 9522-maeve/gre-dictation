<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>随机默写 - 背单词</title>
<style>
  :root {
    --bg: #f5f5f5;
    --card: #fff;
    --text: #333;
    --muted: #999;
    --accent: #4f46e5;
    --accent-hover: #4338ca;
    --success: #16a34a;
    --danger: #dc2626;
    --border: #e5e7eb;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .app { width: 100%; max-width: 480px; }

  /* ===== Splash Screen ===== */
  .splash {
    position: fixed; inset: 0; z-index: 9999;
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 40%, #4f46e5 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity .6s, visibility .6s;
  }
  .splash.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }
  .splash .splash-title {
    font-size: 36px; font-weight: 800; color: #fff;
    letter-spacing: 4px; z-index: 1; text-align: center;
  }
  .splash .splash-sub {
    font-size: 16px; color: rgba(255,255,255,.6);
    margin-top: 12px; z-index: 1; letter-spacing: 2px;
  }
  .splash .splash-hint {
    position: absolute; bottom: 60px;
    font-size: 13px; color: rgba(255,255,255,.35);
    cursor: pointer; z-index: 1;
    animation: pulse-hint 2s infinite;
  }
  @keyframes pulse-hint {
    0%, 100% { opacity: .35; }
    50% { opacity: .8; }
  }

  /* Floating emojis */
  .splash-emoji {
    position: absolute; font-size: 28px;
    animation: float-emoji var(--dur) var(--delay) infinite ease-in-out;
    opacity: 0; z-index: 0; user-select: none;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,.3));
  }
  @keyframes float-emoji {
    0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
    10%  { opacity: .85; }
    80%  { opacity: .85; }
    100% { transform: translateY(-120px) rotate(var(--rot)) scale(var(--scl)); opacity: 0; }
  }

  /* ===== Upload ===== */
  .upload-zone {
    background: var(--card);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: #f8f7ff;
  }
  .upload-zone .icon { font-size: 40px; margin-bottom: 12px; }
  .upload-zone h2 { font-size: 18px; margin-bottom: 6px; }
  .upload-zone p { color: var(--muted); font-size: 14px; }
  .upload-zone input { display: none; }
  .delim-hint { font-size: 12px; color: var(--muted); margin-top: 8px; }

  .saved-info {
    margin-top: 16px; padding: 10px 16px;
    background: #f0fdf4; border-radius: 8px;
    font-size: 13px; color: var(--success);
  }
  .saved-info button {
    margin-left: 8px; padding: 4px 10px; font-size: 12px;
    border: 1px solid var(--success); border-radius: 4px;
    background: transparent; color: var(--success); cursor: pointer;
  }
  .saved-info button:hover { background: var(--success); color: #fff; }
  .saved-info button.danger { border-color: var(--danger); color: var(--danger); }
  .saved-info button.danger:hover { background: var(--danger); color: #fff; }

  /* ===== Config ===== */
  .config {
    background: var(--card); border-radius: var(--radius);
    padding: 12px 20px; margin-bottom: 16px;
    box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .config label { font-size: 13px; color: var(--muted); white-space: nowrap; }
  .config select, .config .btn-sm {
    padding: 6px 10px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 13px; background: var(--card); cursor: pointer;
  }
  .config .btn-sm:hover { background: var(--bg); }
  .config .btn-sm.errbank { border-color: var(--danger); color: var(--danger); }
  .config .btn-sm.errbank:hover { background: #fef2f2; }
  .config .btn-sm.errbank.has-items { border-color: var(--danger); color: #fff; background: var(--danger); font-weight: 600; }
  .config .book-name {
    flex: 1; font-size: 14px; font-weight: 600;
    min-width: 80px; text-align: right;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ===== Quiz card ===== */
  .quiz-card {
    background: var(--card); border-radius: var(--radius);
    padding: 40px 24px; box-shadow: var(--shadow); text-align: center;
  }
  .quiz-card .prompt-label { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  .quiz-card .prompt-word { font-size: 36px; font-weight: 700; margin-bottom: 24px; word-break: break-all; }
  .quiz-card input {
    width: 100%; padding: 12px 16px; font-size: 20px;
    border: 2px solid var(--border); border-radius: 8px;
    text-align: center; outline: none; transition: border-color .2s;
  }
  .quiz-card input:focus { border-color: var(--accent); }
  .quiz-card input.correct { border-color: var(--success); background: #f0fdf4; }
  .quiz-card input.wrong { border-color: var(--danger); background: #fef2f2; }
  .result { margin-top: 16px; font-size: 15px; min-height: 24px; }
  .result .correct-answer { color: var(--success); font-weight: 600; }
  .result .wrong-hint { color: var(--danger); }

  .btn {
    display: inline-block; padding: 12px 32px; font-size: 16px;
    font-weight: 600; border: none; border-radius: 8px;
    cursor: pointer; transition: background .2s;
  }
  .btn-primary { background: var(--accent); color: #fff; margin-top: 20px; }
  .btn-primary:hover { background: var(--accent-hover); }

  /* ===== Stats ===== */
  .stats {
    display: flex; justify-content: center; gap: 20px; margin: 16px 0;
  }
  .stat { text-align: center; }
  .stat .num { font-size: 28px; font-weight: 700; }
  .stat .label { font-size: 12px; color: var(--muted); }
  .stat.good .num { color: var(--success); }
  .stat.bad .num { color: var(--danger); }
  .stat.extra .num { color: var(--accent); }

  .progress-bar {
    height: 4px; background: var(--border); border-radius: 2px;
    margin-top: 16px; overflow: hidden;
  }
  .progress-bar .fill {
    height: 100%; background: var(--accent);
    border-radius: 2px; transition: width .3s;
  }

  .round-info {
    text-align: center; font-size: 13px; color: var(--muted); margin-top: 6px;
  }

  /* ===== Error Bank Modal ===== */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal {
    background: var(--card); border-radius: var(--radius);
    width: 100%; max-width: 500px; max-height: 80vh;
    display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.2);
  }
  .modal-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h3 { font-size: 17px; }
  .modal-header .btn-close {
    width: 32px; height: 32px; border: none; background: var(--bg);
    border-radius: 50%; cursor: pointer; font-size: 18px; line-height: 32px; text-align: center;
  }
  .modal-body {
    flex: 1; overflow-y: auto; padding: 12px 20px;
  }
  .modal-body .err-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .err-item .err-word { font-weight: 600; color: var(--text); }
  .err-item .err-meaning { color: var(--muted); font-size: 14px; }
  .err-item .btn-remove {
    padding: 2px 8px; font-size: 12px; border: 1px solid var(--border);
    border-radius: 4px; background: transparent; cursor: pointer; white-space: nowrap;
  }
  .err-item .btn-remove:hover { background: #fef2f2; border-color: var(--danger); color: var(--danger); }
  .modal-body .empty-hint { text-align: center; color: var(--muted); padding: 40px 0; }
  .modal-footer {
    padding: 12px 20px; border-top: 1px solid var(--border);
    display: flex; gap: 10px; justify-content: flex-end;
  }
  .modal-footer button {
    padding: 8px 18px; font-size: 14px; border-radius: 6px; cursor: pointer;
  }
  .btn-review { background: var(--danger); color: #fff; border: none; }
  .btn-review:hover { background: #b91c1c; }
  .btn-cancel { background: var(--card); border: 1px solid var(--border); }
  .btn-cancel:hover { background: var(--bg); }
  .btn-clear-all { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
  .btn-clear-all:hover { background: #fef2f2; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- ===== Splash Screen ===== -->
<div class="splash" id="splash">
  <div class="splash-title">GRE 随机默写</div>
  <div class="splash-sub">Ready to grind?</div>
  <div class="splash-hint" id="splashSkip">点击跳过</div>
</div>

<div class="app">
  <!-- Upload -->
  <div class="upload-zone" id="uploadZone">
    <div class="icon">📂</div>
    <h2>点击上传词书</h2>
    <p>支持 .txt 文件，每行一个单词</p>
    <p class="delim-hint">格式：<b>英文 中文</b>（空格 / Tab / 逗号分隔均可）</p>
    <div class="saved-info hidden" id="savedInfo">
      上次上传了 <b id="savedName"></b>（<span id="savedCount"></span> 词）
      <button id="btnResume">继续背诵</button>
      <button class="danger" id="btnClear">清除</button>
    </div>
    <input type="file" id="fileInput" accept=".txt">
  </div>

  <!-- Quiz area -->
  <div id="quizArea" class="hidden">
    <div class="config">
      <label>方向</label>
      <select id="direction">
        <option value="en2cn">英→中</option>
        <option value="cn2en">中→英</option>
      </select>
      <button class="btn-sm errbank" id="btnErrBank">📋 错题本</button>
      <span class="book-name" id="bookName"></span>
      <button class="btn-sm" id="btnReset">换词书</button>
    </div>

    <div class="quiz-card">
      <div class="prompt-label" id="promptLabel">写出对应的中文</div>
      <div class="prompt-word" id="promptWord"></div>
      <input type="text" id="answerInput" placeholder="在这里输入你的答案…" autocomplete="off" autocapitalize="off">
      <div class="result" id="result"></div>
      <button class="btn btn-primary" id="btnNext">下一题</button>
      <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
      <div class="round-info">每轮 30 词</div>
    </div>

    <div class="stats">
      <div class="stat good"><span class="num" id="correctCount">0</span><div class="label">正确</div></div>
      <div class="stat bad"><span class="num" id="wrongCount">0</span><div class="label">错误</div></div>
      <div class="stat"><span class="num" id="remainCount">0</span><div class="label">剩余</div></div>
    </div>
  </div>
</div>

<!-- Error Bank Modal -->
<div class="modal-overlay hidden" id="errModal">
  <div class="modal">
    <div class="modal-header">
      <h3>📋 错题本</h3>
      <button class="btn-close" id="btnErrClose">×</button>
    </div>
    <div class="modal-body" id="errList"></div>
    <div class="modal-footer">
      <button class="btn-clear-all" id="btnClearAll">清空全部</button>
      <button class="btn-cancel" id="btnErrCancel">关闭</button>
      <button class="btn-review" id="btnReview">复习错题</button>
    </div>
  </div>
</div>

<script>
(function() {
  const ROUND_SIZE = 30;
  const STORAGE_KEY = 'dictation_words3';
  const STORAGE_NAME = 'dictation_bookname3';
  const ERR_STORAGE = 'dictation_errors3';

  // --- DOM ---
  const splash = document.getElementById('splash');
  const splashSkip = document.getElementById('splashSkip');
  const uploadZone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('fileInput');
  const savedInfo = document.getElementById('savedInfo');
  const savedName = document.getElementById('savedName');
  const savedCount = document.getElementById('savedCount');
  const btnResume = document.getElementById('btnResume');
  const btnClear = document.getElementById('btnClear');
  const quizArea = document.getElementById('quizArea');
  const direction = document.getElementById('direction');
  const bookName = document.getElementById('bookName');
  const promptLabel = document.getElementById('promptLabel');
  const promptWord = document.getElementById('promptWord');
  const answerInput = document.getElementById('answerInput');
  const result = document.getElementById('result');
  const btnNext = document.getElementById('btnNext');
  const btnReset = document.getElementById('btnReset');
  const btnErrBank = document.getElementById('btnErrBank');
  const progressFill = document.getElementById('progressFill');
  const correctCount = document.getElementById('correctCount');
  const wrongCount = document.getElementById('wrongCount');
  const remainCount = document.getElementById('remainCount');
  const errModal = document.getElementById('errModal');
  const errList = document.getElementById('errList');
  const btnErrClose = document.getElementById('btnErrClose');
  const btnErrCancel = document.getElementById('btnErrCancel');
  const btnClearAll = document.getElementById('btnClearAll');
  const btnReview = document.getElementById('btnReview');

  let words = [];
  let queue = [];
  let currentIdx = -1;
  let correct = 0;
  let wrong = 0;
  let answered = false;
  let isReviewMode = false;

  // ===== Splash Screen =====
  function initSplash() {
    const emojis = ['🎸','⭐','🧗‍♂️','😊','📚','🎯','✨','📝','💪','🔥','🎓','🏆','🚀','🌈','💡','🎪','📖','🌟','🎵','🦉'];
    const container = splash;
    const frag = document.createDocumentFragment();
    for (let i = 0; i < 35; i++) {
      const span = document.createElement('span');
      span.className = 'splash-emoji';
      span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      span.style.left = Math.random() * 90 + '%';
      span.style.top = (60 + Math.random() * 35) + '%';
      span.style.setProperty('--dur', (3 + Math.random() * 4) + 's');
      span.style.setProperty('--delay', Math.random() * 2 + 's');
      span.style.setProperty('--rot', (Math.random() * 60 - 30) + 'deg');
      span.style.setProperty('--scl', (0.6 + Math.random() * 1.2));
      span.style.animationDelay = Math.random() * 3 + 's';
      frag.appendChild(span);
    }
    container.appendChild(frag);

    function dismiss() {
      if (splash.classList.contains('fade-out')) return;
      splash.classList.add('fade-out');
      setTimeout(() => splash.remove(), 600);
    }
    splashSkip.addEventListener('click', dismiss);
    setTimeout(dismiss, 3500);
  }

  // ===== Error Bank =====
  function getErrors() {
    try { return JSON.parse(localStorage.getItem(ERR_STORAGE)) || []; }
    catch(e) { return []; }
  }
  function saveErrors(errs) {
    localStorage.setItem(ERR_STORAGE, JSON.stringify(errs));
  }
  function addErrors(errWords) {
    const existing = getErrors();
    for (const ew of errWords) {
      if (!existing.some(e => e.en === ew.en)) {
        existing.push(ew);
      }
    }
    saveErrors(existing);
    updateErrBtn();
  }
  function removeError(en) {
    const existing = getErrors().filter(e => e.en !== en);
    saveErrors(existing);
    updateErrBtn();
    renderErrList();
  }
  function clearErrors() {
    saveErrors([]);
    updateErrBtn();
    renderErrList();
  }
  function updateErrBtn() {
    const errs = getErrors();
    if (errs.length > 0) {
      btnErrBank.classList.add('has-items');
      btnErrBank.textContent = '📋 错题本 (' + errs.length + ')';
    } else {
      btnErrBank.classList.remove('has-items');
      btnErrBank.textContent = '📋 错题本';
    }
  }

  function renderErrList() {
    const errs = getErrors();
    if (errs.length === 0) {
      errList.innerHTML = '<div class="empty-hint">错题本为空，继续加油！</div>';
    } else {
      errList.innerHTML = errs.map(e =>
        `<div class="err-item">
          <span><span class="err-word">${escapeHtml(e.en)}</span>&nbsp;&nbsp;<span class="err-meaning">${escapeHtml(e.cn)}</span></span>
          <button class="btn-remove" data-en="${escapeHtml(e.en)}">移除</button>
        </div>`
      ).join('');
      errList.querySelectorAll('.btn-remove').forEach(btn => {
        btn.addEventListener('click', () => removeError(btn.dataset.en));
      });
    }
  }

  function openErrBank() {
    renderErrList();
    errModal.classList.remove('hidden');
  }
  function closeErrBank() {
    errModal.classList.add('hidden');
  }

  btnErrBank.addEventListener('click', openErrBank);
  btnErrClose.addEventListener('click', closeErrBank);
  btnErrCancel.addEventListener('click', closeErrBank);
  errModal.addEventListener('click', function(e) {
    if (e.target === errModal) closeErrBank();
  });
  btnClearAll.addEventListener('click', function() {
    if (getErrors().length === 0) return;
    if (confirm('确定要清空全部错题吗？')) clearErrors();
  });
  btnReview.addEventListener('click', function() {
    const errs = getErrors();
    if (errs.length === 0) { alert('错题本为空'); return; }
    // Replace words with error bank for review
    words = errs.slice(); // copy
    isReviewMode = true;
    bookName.textContent = '错题复习';
    closeErrBank();
    startQuiz();
  });

  // ===== localStorage for word bank =====
  function saveToStorage() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
      localStorage.setItem(STORAGE_NAME, bookName.textContent);
    } catch(e) {}
  }
  function loadFromStorage() {
    try {
      const data = localStorage.getItem(STORAGE_KEY);
      const name = localStorage.getItem(STORAGE_NAME);
      if (data && name) {
        words = JSON.parse(data);
        savedName.textContent = name;
        savedCount.textContent = words.length;
        savedInfo.classList.remove('hidden');
      }
    } catch(e) {}
  }
  function clearStorage() {
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(STORAGE_NAME);
    savedInfo.classList.add('hidden');
  }

  // ===== Upload =====
  uploadZone.addEventListener('click', () => fileInput.click());
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) processFile(file);
  });
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (file) processFile(file);
  });
  btnResume.addEventListener('click', () => {
    isReviewMode = false;
    bookName.textContent = savedName.textContent;
    startQuiz();
  });
  btnClear.addEventListener('click', () => {
    if (confirm('确定要清除已保存的词书吗？')) clearStorage();
  });

  function processFile(file) {
    if (!file.name.endsWith('.txt')) { alert('请上传 .txt 文件'); return; }
    const reader = new FileReader();
    reader.onload = function() { parseWords(reader.result, file.name); };
    reader.readAsText(file, 'UTF-8');
  }

  function parseWords(text, filename) {
    words = [];
    const lines = text.split(/\r?\n/);
    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed) continue;
      let parts = null;
      if (trimmed.includes('\t')) {
        parts = trimmed.split('\t');
      } else if (trimmed.includes(',')) {
        parts = trimmed.split(',');
      } else if (trimmed.includes('，')) {
        parts = trimmed.split('，');
      } else {
        const m = trimmed.match(/^(\S+)\s+(.*)$/);
        if (m) parts = [m[1], m[2]];
      }
      if (parts && parts.length >= 2) {
        const en = parts[0].trim();
        const cn = parts.slice(1).join(' ').trim();
        if (en && cn) words.push({ en, cn });
      }
    }
    if (words.length === 0) {
      alert('未能从文件中解析出单词。请确保格式为：英文 中文（每行一个）');
      return;
    }
    isReviewMode = false;
    bookName.textContent = filename;
    saveToStorage();
    startQuiz();
  }

  // ===== Quiz =====
  function startQuiz() {
    uploadZone.classList.add('hidden');
    quizArea.classList.remove('hidden');
    resetQueue();
  }

  function resetQueue() {
    // Pick ROUND_SIZE random words (or all if fewer)
    const pool = words.length;
    const count = Math.min(ROUND_SIZE, pool);
    const indices = Array.from({ length: pool }, (_, i) => i);
    // Fisher-Yates partial shuffle
    for (let i = 0; i < count; i++) {
      const j = i + Math.floor(Math.random() * (pool - i));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    queue = indices.slice(0, count);
    correct = 0;
    wrong = 0;
    answered = false;
    updateStats();
    updateErrBtn();
    nextWord();
  }

  function nextWord() {
    if (queue.length === 0) {
      // Round complete
      promptWord.textContent = '🎉';
      const total = correct + wrong;
      const pct = total > 0 ? Math.round(correct / total * 100) : 0;
      promptLabel.textContent = isReviewMode ? '错题复习完成！' : '本轮默写完成！';
      answerInput.classList.add('hidden');
      btnNext.textContent = isReviewMode ? '再来一轮错题' : '再来一轮';
      result.innerHTML = `<span class="correct-answer">正确 ${correct} / ${total}（${pct}%）</span>`;
      progressFill.style.width = '100%';
      remainCount.textContent = '0';
      answered = true;
      return;
    }

    answered = false;
    currentIdx = queue.pop();
    const word = words[currentIdx];

    if (direction.value === 'en2cn') {
      promptWord.textContent = word.en;
      promptLabel.textContent = '写出对应的中文';
    } else {
      promptWord.textContent = word.cn;
      promptLabel.textContent = '写出对应的英文';
    }

    answerInput.value = '';
    answerInput.className = '';
    answerInput.classList.remove('hidden');
    answerInput.focus();
    result.innerHTML = '';
    btnNext.textContent = '跳过';
    btnNext.classList.remove('hidden');
    updateStats();
    updateProgress();
  }

  function checkAnswer() {
    if (answered) return;
    const raw = answerInput.value.trim();
    if (!raw) return;

    answered = true;
    const word = words[currentIdx];
    let expected;
    if (direction.value === 'en2cn') {
      expected = word.cn;
    } else {
      expected = word.en;
    }

    const userAnswer = (direction.value === 'en2cn') ? raw : raw.toLowerCase();
    const isCorrect = isMatch(userAnswer, expected);

    if (isCorrect) {
      answerInput.className = 'correct';
      result.innerHTML = '<span class="correct-answer">✓ 正确！</span>';
      correct++;
    } else {
      answerInput.className = 'wrong';
      result.innerHTML = `<span class="wrong-hint">✗ 错误</span> &nbsp; 正确答案：<span class="correct-answer">${escapeHtml(expected)}</span>`;
      wrong++;
      // Add to error bank
      addErrors([{ en: word.en, cn: word.cn }]);
    }

    btnNext.textContent = '下一题';
    updateStats();
  }

  function isMatch(user, expected) {
    const u = user.replace(/\s+/g, '').toLowerCase();
    const e = expected.replace(/\s+/g, '').toLowerCase();
    if (u === e) return true;
    const parts = expected.split(/[\/；;]/);
    for (const p of parts) {
      if (u === p.replace(/\s+/g, '').toLowerCase()) return true;
    }
    const enParts = expected.split(/[,，]/);
    for (const p of enParts) {
      if (u === p.replace(/\s+/g, '').toLowerCase()) return true;
    }
    return false;
  }

  function skipWord() {
    if (answered) return;
    answered = true;
    const word = words[currentIdx];
    const expected = direction.value === 'en2cn' ? word.cn : word.en;
    answerInput.className = 'wrong';
    result.innerHTML = `正确答案：<span class="correct-answer">${escapeHtml(expected)}</span>`;
    wrong++;
    addErrors([{ en: word.en, cn: word.cn }]);
    btnNext.textContent = '下一题';
    updateStats();
  }

  function updateStats() {
    correctCount.textContent = correct;
    wrongCount.textContent = wrong;
    remainCount.textContent = queue.length;
  }

  function updateProgress() {
    const total = Math.min(ROUND_SIZE, words.length);
    const done = correct + wrong;
    progressFill.style.width = total > 0 ? (done / total * 100) + '%' : '0%';
  }

  function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  // ===== Events =====
  answerInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (!answered) checkAnswer();
      else nextWord();
    }
  });

  btnNext.addEventListener('click', function() {
    if (!answered) {
      const raw = answerInput.value.trim();
      if (raw) checkAnswer();
      else skipWord();
    } else {
      if (queue.length === 0 && answered) {
        if (isReviewMode) {
          // Back to error bank
          quizArea.classList.add('hidden');
          uploadZone.classList.remove('hidden');
          isReviewMode = false;
          loadFromStorage();
          words = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
          return;
        }
        resetQueue();
        return;
      }
      nextWord();
    }
  });

  direction.addEventListener('change', () => resetQueue());
  btnReset.addEventListener('click', () => {
    words = [];
    queue = [];
    isReviewMode = false;
    clearStorage();
    uploadZone.classList.remove('hidden');
    quizArea.classList.add('hidden');
    fileInput.value = '';
  });

  // ===== Init =====
  initSplash();
  loadFromStorage();
  updateErrBtn();
})();
</script>
</body>
</html>
